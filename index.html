<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heatmap interactivo de Tui</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
<style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
        }
        #map {
            height: 100vh;
            width: 100%;
        }
        .info-box {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: white;
            padding: 10px 15px;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            pointer-events: none;
        }
        
        /* Export Buttons Container */
        .export-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            display: flex;
            gap: 10px; /* Space between buttons */
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000;
        }
        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            text-align: center;
            width: 250px;
        }
        .modal-content input {
            width: 80%;
            padding: 8px;
            margin: 10px 0;
            font-size: 16px;
        }

        #csvInput {
            width: 230px;
        }
        
        /* Button Styles */
        .btn {
            padding: 8px 15px;
            margin: 5px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
        }
        .btn-submit { background: #4CAF50; color: white; }
        .btn-cancel { background: #f44336; color: white; }
        .btn-map { 
            color: white; 
            padding: 12px 20px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .btn-export { 
            background: #2196F3; 
        }
        .btn-export:hover { background: #0b7dda; }
        .btn-image { background: #9C27B0; }
        .btn-image:hover { background: #7B1FA2; }
        .btn-load { background: #27b050; }
        .btn-load:hover { background: #1fa246; }
		
		/* legend */
		.legend-container {
		            gap: 20px;
		            margin-bottom: 15px;
		            padding: 10px;
		            width: fit-content;
		            position: absolute;
		            top: 60px;
		            right: 10px;
		            z-index: 1000;
		            background: white;
		            padding: 10px 15px;
		            border-radius: 5px;
		            box-shadow: 0 0 15px rgba(0,0,0,0.2);
		            pointer-events: none;
		        }

		        .legend-item {
		            display: flex;
		            align-items: center;
		            gap: 8px; /* Space between the box and the text */
		            font-size: 14px;
		        }

		        .color-box {
		            width: 16px;
		            height: 16px;
		            border-radius: 3px;
		            border: 1px solid rgba(0,0,0,0.1); /* Subtle border for visibility */
		        }

		        /* The 4 requested colors */
		        .bg-lightblue { background-color: #adb2e6; }
		        .bg-yellow { background-color: #ffd700; } /* Using a slightly darker gold/yellow for better text contrast if needed */
		        .bg-orange { background-color: #ffa500; }
		        .bg-red { background-color: #ff4c4c; }
    </style>
</head>
<body>

    <div class="info-box">Haz doble click en el mapa para añadir un valor nuevo</div>
	
	<div class="legend-container">
	        <div class="legend-item">
	            <div class="color-box bg-lightblue"></div>
	            <span>Sin restos</span>
	        </div>
			<br/>
	        <div class="legend-item">
	            <div class="color-box bg-yellow"></div>
	            <span>Hallazgo descontextualizado</span>
	        </div>
			<br/>
	        <div class="legend-item">
	            <div class="color-box bg-orange"></div>
	            <span>Hallazgo en contexto</span>
	        </div>
			<br/>
			<div class="legend-item">
	            <div class="color-box bg-red"></div>
	            <span>Edificaciones</span>
	        </div>
	 </div>
    
	<div class="export-container">
        <button class="btn btn-map btn-export" onclick="exportCSV()">Exportar datos</button>
        <button class="btn btn-map btn-load" onclick="openCSVModal()">Cargar Datos</button>
        <button class="btn btn-map btn-image" onclick="exportJPEG()">Guardar Imagen</button>
        
    </div>

    <div id="map"></div>

    <div id="modal-enter-data" class="modal">
        <div class="modal-content">
            <h4>Añadir Valor al mapa</h4>
			<label for="heatValue">Registro:</label>
			<select id="heatValue" name="tipoHallazgo">
			    <option value="1">Sin restos</option>
			    <option value="2">Hallazgo descontextualizado</option>
			    <option value="3">Hallazgo en contexto</option>
			    <option value="4">Edificaciones</option>
			</select>
            <br>
			<br>
            <button class="btn btn-submit" onclick="submitPoint()">Añadir</button>
            <button class="btn btn-cancel" onclick="closeModal()">Cancelar</button>
        </div>
    </div>

    <div id="csvModal" class="modal">
        <div class="modal-content">
            <h3>Cargar datos en CSV</h3>
            <p>Formato: <code>latitud,longitud,valor</code> (p.ej. 42.046842,-8.643129,4.00)</p>
            <textarea id="csvInput" rows="8" placeholder="lat,lon,0.00"></textarea>
            <button class="btn btn-submit" onclick="loadCSV()">Cargar</button>
            <button class="btn btn-cancel" onclick="closeCSVModal()">Cancelar</button>
        </div>
    </div>

	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script>
        // 1. Initialize the map
        const map = L.map('map', {
            doubleClickZoom: false 
        }).setView([42.05, -8.642942], 16);

        // 2. Add the base map tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
			crossOrigin: true
        }).addTo(map);

        // 3. Generate initial data points
        const heatPoints = [];
		// Load predefined values: 
		// heatPoints.push([<lat>, <lng>, <intensity>]);

        // 4. Create the heatmap layer
        const heat = L.heatLayer(heatPoints, {
            radius: 25,
            blur: 15,
            maxZoom: 13,
            max: 4.0,
			gradient: {     // Optional: Customizing the color gradient
			                0.2: 'blue', 
			                0.6: 'yellow', 
			                0.8: 'orange', 
			                1.0: 'red'
			            }
        }).addTo(map);

        // --- INTERACTIVE LOGIC ---

        let clickedLatLng = null; 
        const modal = document.getElementById('modal-enter-data');
        const inputField = document.getElementById('heatValue');
        const csvModal = document.getElementById("csvModal");
        const csvInput = document.getElementById("csvInput");

        // Listen for double clicks
        map.on('dblclick', function(e) {
            clickedLatLng = e.latlng; 
            modal.style.display = 'block'; 
            inputField.value = ''; 
            inputField.focus(); 
        });

        

        // Submit new point
        function submitPoint() {
            const val = parseFloat(inputField.value);

            if (isNaN(val) || val < 1 || val > 5) {
                alert("Introduce un valor entre 1 y 5");
                return;
            }

            if (clickedLatLng) {
                // Add to the visual heatmap layer
                heat.addLatLng([clickedLatLng.lat, clickedLatLng.lng, val]);
                
                // CRUCIAL: Also push to our heatPoints array so it gets included in the CSV export
               //heatPoints.push([clickedLatLng.lat, clickedLatLng.lng, val]);
            }

            closeModal();
        }

        function closeModal() {
            modal.style.display = 'none';
            clickedLatLng = null; 
        }

        function openCSVModal() {
            csvModal.style.display = 'block';
        }

        function closeCSVModal() {
            csvModal.style.display = 'none';
        }

        function loadCSV() {
            const rawText = csvInput.value;
            // Split the text into an array of lines
            const lines = rawText.split('\n');
            lines.forEach((line, index) => {
                // Remove whitespace and ignore empty lines
                const cleanLine = line.trim();
                if (cleanLine === '') return; 
                const parts = cleanLine.split(',');

                // Validate that we have exactly 3 parts
                if (parts.length === 3) {
                    const lat = parseFloat(parts[0].trim());
                    const long = parseFloat(parts[1].trim());
                    const val = parseFloat(parts[2].trim());
                    if (lat && long && val) {
                        heat.addLatLng([lat, long, val]);
                    } else {
                        console.warn(`Line ${index + 1} is invalid and was skipped: "${line}"`);
                    }
                } else {
                    console.warn(`Line ${index + 1} is invalid and was skipped: "${line}"`);
                }
            });

            // Close the modal after parsing
            csvModal.style.display = "none";
            //heat.addLatLng([clickedLatLng.lat, clickedLatLng.lng, val]);
        }
		

        // --- EXPORT TO CSV LOGIC ---

        function exportCSV() {
            // 1. Create the CSV headers
            let csvContent = "Latitud,Longitud,Valor\n";

            // 2. Loop through our dataset and format it into a string
            heatPoints.forEach(function(point) {
                // point[0] is lat, point[1] is lng, point[2] is value
                csvContent += `${point[0].toFixed(6)},${point[1].toFixed(6)},${point[2].toFixed(2)}\n`;
            });

            // 3. Create a Blob object representing the data as a CSV file
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            
            // 4. Create a temporary invisible link element to trigger the download
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            
            link.setAttribute("href", url);
            link.setAttribute("download", "heatmap_dataset.csv"); // Filename
            link.style.visibility = 'hidden';
            
            // 5. Append it, click it, and clean it up
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        
// --- EXPORT TO JPEG LOGIC ---

        function exportJPEG() {
            // Target the map container
            const mapElement = document.getElementById('map');
            
            // Use html2canvas to render the DOM as a canvas
            html2canvas(mapElement, {
                useCORS: true,       // Tells it to fetch cross-origin images (our map tiles)
                allowTaint: false    // Prevents the canvas from being locked down for security
            }).then(function(canvas) {
                // Convert the canvas to a JPEG data URL (0.9 is image quality 90%)
                const imgData = canvas.toDataURL('image/jpeg', 0.9);
                
                // Create a temporary link to download the image
                const link = document.createElement('a');
                link.download = 'heatmap_snapshot.jpg';
                link.href = imgData;
                link.click();
            }).catch(function(error) {
                console.error("Error capturing the map image:", error);
                alert("There was an issue capturing the map. Check the console for details.");
            });
		}
    </script>
</body>
</html>
